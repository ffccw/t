<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快樂！駱駱</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --grass: #5BAD52;
    --grass-dark: #3D8A35;
    --grass-light: #7DCF74;
    --soil: #8B5E3C;
    --sky: #B8E8FF;
    --cream: #FFF8E7;
    --warm: #FFE0A0;
    --flower-pink: #F48FB1;
    --flower-yellow: #FFF176;
    --text-dark: #2D4A1E;
    --text-mid: #4A7A32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #D4F0FF 0%, #B8E8FF 50%, #8ED8F5 100%);
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Clouds */
  .cloud { position: fixed; background: white; border-radius: 50px; opacity: 0.85; animation: drift linear infinite; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
  .c1 { width: 120px; height: 38px; top: 8%; animation-duration: 32s; }
  .c1::before { width: 55px; height: 55px; top: -28px; left: 14px; }
  .c1::after { width: 42px; height: 42px; top: -20px; left: 52px; }
  .c2 { width: 80px; height: 26px; top: 20%; animation-duration: 48s; animation-delay: -20s; opacity: 0.6; }
  .c2::before { width: 38px; height: 38px; top: -18px; left: 8px; }
  .c2::after { width: 28px; height: 28px; top: -13px; left: 36px; }
  .c3 { width: 100px; height: 32px; top: 6%; animation-duration: 40s; animation-delay: -10s; }
  .c3::before { width: 46px; height: 46px; top: -24px; left: 10px; }
  .c3::after { width: 36px; height: 36px; top: -16px; left: 44px; }
  @keyframes drift { from { left: -200px; } to { left: 110vw; } }

  /* Ground */
  .ground { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--grass); border-radius: 60% 60% 0 0 / 18px 18px 0 0; z-index: 1; }
  .ground::before { content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 18px; background: var(--grass-light); border-radius: 50%; }
  .ground::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 32px; background: var(--soil); }

  /* Grass */
  .grass-blades { position: fixed; bottom: 58px; left: 0; right: 0; height: 38px; z-index: 2; pointer-events: none; }
  .blade { position: absolute; bottom: 0; width: 5px; background: var(--grass-dark); border-radius: 3px 3px 0 0; transform-origin: bottom center; animation: sway ease-in-out infinite alternate; }
  @keyframes sway { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

  /* Pikmin */
  .pikmin-group { position: fixed; bottom: 64px; z-index: 4; display: flex; gap: 4px; align-items: flex-end; }
  .pikmin-wrap { animation: pbob ease-in-out infinite alternate; cursor: pointer; }
  @keyframes pbob { from { transform: translateY(0); } to { transform: translateY(-5px); } }

  /* Flowers */
  .flower { position: fixed; z-index: 3; animation: fbob ease-in-out infinite alternate; }
  @keyframes fbob { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-4px) rotate(3deg); } }
  .flower-stem { width: 3px; margin: 0 auto; background: var(--grass-dark); border-radius: 2px; }
  .flower-head { width: 22px; height: 22px; position: relative; margin: 0 auto; }
  .petal { position: absolute; width: 9px; height: 13px; border-radius: 50%; top: 50%; left: 50%; transform-origin: bottom center; }
  .flower-center { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: #FFF176; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; }

  /* Leaves */
  .leaf { position: fixed; font-size: 15px; pointer-events: none; animation: lfloat linear infinite; opacity: 0; z-index: 5; }
  @keyframes lfloat { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

  /* Card */
  .card {
    position: relative; z-index: 10;
    width: min(460px, 90vw);
    background: var(--cream);
    border-radius: 32px;
    padding: 34px 34px 30px;
    box-shadow: 0 8px 0 #d4c990, 0 14px 36px rgba(0,0,0,0.13), inset 0 2px 0 rgba(255,255,255,0.9);
    border: 3px solid #e8d87a;
    animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardPop { from { opacity: 0; transform: scale(0.7) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .card::before { content: ''; position: absolute; inset: 8px; border-radius: 24px; border: 2px dashed rgba(93,173,82,0.25); pointer-events: none; }

  .level-badge { text-align: center; margin-bottom: 18px; animation: bpop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes bpop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

  .level-tag { display: inline-block; background: var(--grass); color: white; font-size: 10px; font-weight: 800; letter-spacing: 3px; padding: 5px 16px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 3px 0 var(--grass-dark); text-transform: uppercase; }

  .level-numbers { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .level-num { font-size: clamp(50px,12vw,68px); font-weight: 900; color: var(--text-dark); line-height: 1; text-shadow: 0 4px 0 rgba(45,74,30,0.18); }
  .level-arrow { font-size: 26px; color: var(--grass); animation: apulse 1s ease-in-out infinite; }
  @keyframes apulse { 0%,100% { transform: translateX(0); opacity: 1; } 50% { transform: translateX(5px); opacity: 0.5; } }

  .name-row { text-align: center; margin-bottom: 18px; animation: sup 0.5s 0.35s both; }
  .name-text { font-size: 21px; font-weight: 900; color: var(--text-dark); font-family: 'Noto Sans TC', sans-serif; }
  .name-text .hi { color: var(--grass-dark); position: relative; display: inline-block; }
  .name-text .hi::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 4px; background: var(--flower-pink); border-radius: 2px; }
  @keyframes sup { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; animation: sup 0.5s 0.5s both; }
  .stat-box { background: white; border-radius: 16px; padding: 11px 13px; border: 2px solid #e8f5e0; box-shadow: 0 3px 0 #d4ebc8; transition: transform 0.2s; }
  .stat-box:hover { transform: translateY(-2px); }
  .stat-label { font-size: 9px; font-weight: 800; letter-spacing: 1px; color: var(--text-mid); text-transform: uppercase; margin-bottom: 3px; display: block; }
  .stat-value { font-size: 14px; font-weight: 800; color: var(--text-dark); font-family: 'Noto Sans TC', sans-serif; }
  .tag { font-size: 10px; background: #FFF176; color: var(--text-dark); padding: 1px 5px; border-radius: 8px; font-weight: 700; }

  .message { background: white; border-radius: 20px; padding: 15px 17px; margin: 14px 0; border: 2px solid #e8f5e0; box-shadow: 0 3px 0 #d4ebc8; animation: sup 0.5s 0.65s both; position: relative; }
  .message::before { content: '🌿'; position: absolute; top: -12px; left: 14px; font-size: 18px; }
  .message p { font-size: 14px; color: var(--text-dark); line-height: 1.85; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; }
  .message p strong { color: var(--grass-dark); font-weight: 700; }

  .xp-wrap { margin: 14px 0; animation: sup 0.5s 0.8s both; }
  .xp-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--text-mid); letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
  .xp-track { height: 16px; background: #e8f5e0; border-radius: 20px; overflow: hidden; border: 2px solid #c8e8b8; }
  .xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--grass-dark), var(--grass-light)); border-radius: 20px; animation: xpg 2s 1s cubic-bezier(0.23,1,0.32,1) forwards; position: relative; overflow: hidden; }
  @keyframes xpg { to { width: 100%; } }
  .xp-fill::after { content: ''; position: absolute; top: 3px; left: 10px; width: 36px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 2px; }

  .wish-btn { width: 100%; margin-top: 18px; padding: 15px; font-family: 'Nunito','Noto Sans TC',sans-serif; font-size: 15px; font-weight: 800; background: var(--grass); border: none; color: white; cursor: pointer; border-radius: 20px; box-shadow: 0 5px 0 var(--grass-dark), 0 8px 16px rgba(61,138,53,0.3); transition: transform 0.1s, box-shadow 0.1s; animation: sup 0.5s 0.95s both; letter-spacing: 1px; }
  .wish-btn:hover { background: var(--grass-light); }
  .wish-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--grass-dark); }

  .wish-result { display: none; text-align: center; margin-top: 12px; font-size: 13px; font-weight: 700; color: var(--text-mid); font-family: 'Noto Sans TC',sans-serif; line-height: 1.8; animation: rpop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes rpop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

  /* Cake modal */
  .cake-overlay { display: none; position: fixed; inset: 0; background: rgba(184,232,255,0.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  .cake-overlay.show { display: flex; }
  .cake-modal { position: relative; text-align: center; animation: ckin 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes ckin { from { opacity: 0; transform: scale(0.5) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .cake-close { position: absolute; top: -34px; right: 0; font-family: 'Nunito',sans-serif; font-size: 11px; font-weight: 800; color: var(--text-mid); cursor: pointer; background: white; border: 2px solid #c8e8b8; border-radius: 12px; padding: 4px 10px; transition: background 0.2s; }
  .cake-close:hover { background: var(--warm); }
  .cake-canvas-wrap { border: 3px solid #e8d87a; border-radius: 28px; background: var(--cream); padding: 22px 26px 18px; box-shadow: 0 8px 0 #d4c990, 0 12px 30px rgba(0,0,0,0.1); }
  #cakeCanvas { display: block; border-radius: 10px; }
  .cake-caption { font-family: 'Nunito',sans-serif; font-size: 13px; font-weight: 800; color: var(--text-dark); letter-spacing: 2px; margin-top: 10px; }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>
<div id="leaves"></div>
<div class="ground"></div>
<div class="grass-blades" id="gb"></div>
<div id="flowers"></div>
<div class="pikmin-group" id="pg1" style="left:16px;"></div>
<div class="pikmin-group" id="pg2" style="right:16px;"></div>
<canvas id="confetti"></canvas>

<div class="cake-overlay" id="cakeOverlay" onclick="closeCake(event)">
  <div class="cake-modal">
    <button class="cake-close" onclick="document.getElementById('cakeOverlay').classList.remove('show')">✕ 關閉</button>
    <div class="cake-canvas-wrap">
      <canvas id="cakeCanvas" width="260" height="230"></canvas>
      <div class="cake-caption">🌸 HAPPY BIRTHDAY 🌸</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="level-badge">
    <div class="level-tag">✦ Level Up ✦</div>
    <div class="level-numbers">
      <span class="level-num">57</span>
      <span class="level-arrow">→</span>
      <span class="level-num">58</span>
    </div>
  </div>

  <div class="name-row">
    <div class="name-text">生日快樂，<span class="hi">駱駱</span>！🎉</div>
  </div>

  <div class="xp-wrap">
    <div class="xp-label"><span>經驗值</span><span>MAX</span></div>
    <div class="xp-track"><div class="xp-fill"></div></div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <span class="stat-label">STATUS</span>
      <div class="stat-value">進化中 <span class="tag">▲</span></div>
    </div>
    <div class="stat-box">
      <span class="stat-label">TODAY</span>
      <div class="stat-value">🎂 生日</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">SKILL</span>
      <div class="stat-value">AI 能手 ✨</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">WISHES</span>
      <div class="stat-value">∞ 無限</div>
    </div>
  </div>

  <div class="message">
    <p>
      Level 58 的駱駱，<br>
      今日獲得稀有道具：<strong>數位蛋糕</strong>。<br>
      請好好享用。
    </p>
  </div>

  <button class="wish-btn" onclick="makeWish()">🌸 點擊實現願望</button>
  <div class="wish-result" id="wishResult"></div>
</div>

<script>
  // Grass blades
  const gb = document.getElementById('gb');
  for (let i=0;i<55;i++) {
    const b=document.createElement('div'); b.className='blade';
    const h=Math.random()*18+14;
    b.style.cssText=`left:${Math.random()*100}%;height:${h}px;animation-duration:${Math.random()*1.5+1}s;animation-delay:${Math.random()}s;`;
    gb.appendChild(b);
  }

  // Flowers
  const fColors=['#F48FB1','#FFB6C1','#CE93D8','#F8BBD9','#FF9EBF'];
  const fc=document.getElementById('flowers');
  [7,17,27,73,83,93].forEach((pos,i)=>{
    const f=document.createElement('div'); f.className='flower';
    const sh=Math.random()*18+22;
    f.style.cssText=`left:${pos}%;bottom:${60+sh}px;animation-duration:${Math.random()*1.5+1.5}s;animation-delay:${Math.random()}s;`;
    const col=fColors[i%fColors.length];
    f.innerHTML=`<div class="flower-head">${[0,60,120,180,240,300].map(a=>`<div class="petal" style="background:${col};transform:translate(-50%,-100%) rotate(${a}deg);"></div>`).join('')}<div class="flower-center"></div></div><div class="flower-stem" style="height:${sh}px;"></div>`;
    fc.appendChild(f);
  });

  // Pikmin
  function mkPikmin(color,stemCol,flowerCol,delay,scale=1){
    const w=document.createElement('div'); w.className='pikmin-wrap';
    w.style.cssText=`animation-delay:${delay}s;transform-origin:bottom center;`;
    w.innerHTML=`<svg width="40" height="58" viewBox="0 0 42 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="21" y1="10" x2="21" y2="1" stroke="${stemCol}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="21" cy="0" r="5" fill="${flowerCol}"/>
      <circle cx="21" cy="0" r="2.5" fill="#FFF176"/>
      <ellipse cx="21" cy="32" rx="12" ry="14" fill="${color}"/>
      <circle cx="21" cy="18" r="10" fill="${color}"/>
      <circle cx="17.5" cy="16" r="3.5" fill="white"/>
      <circle cx="24.5" cy="16" r="3.5" fill="white"/>
      <circle cx="18" cy="16.5" r="2" fill="#222"/>
      <circle cx="25" cy="16.5" r="2" fill="#222"/>
      <circle cx="18.7" cy="15.8" r="0.7" fill="white"/>
      <circle cx="25.7" cy="15.8" r="0.7" fill="white"/>
      <ellipse cx="21" cy="20" rx="2.5" ry="1.5" fill="rgba(0,0,0,0.13)"/>
      <ellipse cx="16" cy="46" rx="4" ry="5" fill="${color}"/>
      <ellipse cx="26" cy="46" rx="4" ry="5" fill="${color}"/>
      <ellipse cx="15" cy="51" rx="5" ry="3" fill="${color}" opacity="0.8"/>
      <ellipse cx="27" cy="51" rx="5" ry="3" fill="${color}" opacity="0.8"/>
      <ellipse cx="9" cy="30" rx="4" ry="2.5" fill="${color}" transform="rotate(-20 9 30)"/>
      <ellipse cx="33" cy="30" rx="4" ry="2.5" fill="${color}" transform="rotate(20 33 30)"/>
    </svg>`;
    w.addEventListener('click',()=>{
      w.style.animation='none'; void w.offsetHeight;
      w.style.animation='pikminHop 0.45s ease-in-out';
      setTimeout(()=>w.style.animation='',500);
    });
    return w;
  }

  // Add pikminHop keyframe dynamically
  const s=document.createElement('style');
  s.textContent='@keyframes pikminHop{0%{transform:translateY(0) rotate(0)}40%{transform:translateY(-22px) rotate(12deg)}70%{transform:translateY(-8px) rotate(-5deg)}100%{transform:translateY(0) rotate(0)}}';
  document.head.appendChild(s);

  document.getElementById('pg1').append(mkPikmin('#E8372A','#3D8A35','#F48FB1',0),mkPikmin('#F5C842','#3D8A35','white',0.25,0.9),mkPikmin('#4A90D9','#3D8A35','#B3E5FC',0.5));
  document.getElementById('pg2').append(mkPikmin('#7B4FB5','#3D8A35','#CE93D8',0.15,0.95),mkPikmin('#E8372A','#3D8A35','#FFF176',0.35,0.85));

  // Floating leaves
  const lc=document.getElementById('leaves');
  ['🍃','🌿','🍀','🌱'].forEach((e,i)=>{
    for(let j=0;j<3;j++){
      const l=document.createElement('div'); l.className='leaf'; l.textContent=e;
      l.style.cssText=`left:${Math.random()*100}%;animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*12}s;`;
      lc.appendChild(l);
    }
  });

  // Confetti
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  let confettis=[],animating=false;
  const colors=['#5BAD52','#F5C842','#4A90D9','#F48FB1','#7B4FB5','#E8372A','#FFF176'];

  function spawnConfetti(){
    for(let i=0;i<100;i++) confettis.push({x:Math.random()*canvas.width,y:-10,r:Math.random()*7+3,d:Math.random()*3+1,color:colors[Math.floor(Math.random()*colors.length)],tilt:Math.random()*10-5,tiltSpeed:Math.random()*0.1+0.05,angle:0,shape:Math.random()>0.5?'c':'r'});
  }
  function animateConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettis.forEach(c=>{
      c.y+=c.d+1.5; c.x+=Math.sin(c.angle)*1.5; c.angle+=0.05; c.tilt+=c.tiltSpeed;
      ctx.fillStyle=c.color; ctx.globalAlpha=0.9;
      if(c.shape==='c'){ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();}
      else{ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.tilt);ctx.fillRect(-c.r,-c.r/2,c.r*2,c.r);ctx.restore();}
    });
    ctx.globalAlpha=1;
    confettis=confettis.filter(c=>c.y<canvas.height+20);
    if(confettis.length>0) requestAnimationFrame(animateConfetti); else animating=false;
  }

  const wishes=["🌸 願望已送達！\n宇宙正在處理中...","🍀 傳說級祝福已解鎖！","🌿 幸運值 MAX，全年有效！","✨ 新技能解鎖：無敵狀態 +365天","🎉 心願達成！好事正在路上！"];
  let wishIdx=0;

  function makeWish(){
    const r=document.getElementById('wishResult');
    r.style.display='block'; r.style.animation='none'; void r.offsetHeight;
    r.style.animation='rpop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    r.textContent=wishes[wishIdx%wishes.length]; wishIdx++;
    spawnConfetti(); if(!animating){animating=true;animateConfetti();}
    showCake();
  }

  function closeCake(e){ if(e.target===document.getElementById('cakeOverlay')) document.getElementById('cakeOverlay').classList.remove('show'); }

  function showCake(){
    document.getElementById('cakeOverlay').classList.add('show');
    drawCake();
  }

  function drawCake(){
    const c=document.getElementById('cakeCanvas');
    const cx=c.getContext('2d');
    cx.clearRect(0,0,c.width,c.height);

    // bg
    cx.fillStyle='#F0FAE8'; cx.beginPath(); cx.roundRect(0,0,c.width,c.height,12); cx.fill();

    // bottom tier
    cx.fillStyle='#E8372A'; cx.beginPath(); cx.roundRect(38,140,184,60,12); cx.fill();
    cx.fillStyle='#C0392B'; cx.beginPath(); cx.roundRect(38,185,184,15,[0,0,12,12]); cx.fill();
    cx.fillStyle='white';
    for(let i=0;i<9;i++){cx.beginPath();cx.arc(52+i*20,143,10,Math.PI,0);cx.fill();}
    // sprinkles
    const sc=['#F5C842','#4A90D9','#7B4FB5','#F48FB1','#5BAD52'];
    for(let i=0;i<22;i++){cx.fillStyle=sc[i%5];cx.save();cx.translate(50+Math.random()*160,155+Math.random()*25);cx.rotate(Math.random()*Math.PI);cx.fillRect(-4,-1.5,8,3);cx.restore();}

    // mid tier
    cx.fillStyle='#7B4FB5'; cx.beginPath(); cx.roundRect(63,94,134,52,10); cx.fill();
    cx.fillStyle='#6C3483'; cx.beginPath(); cx.roundRect(63,130,134,16,[0,0,10,10]); cx.fill();
    cx.fillStyle='white';
    for(let i=0;i<7;i++){cx.beginPath();cx.arc(74+i*18,97,8,Math.PI,0);cx.fill();}
    cx.fillStyle='#FFF176'; cx.font='bold 22px Nunito,sans-serif'; cx.textAlign='center'; cx.fillText('58',130,123);

    // top tier
    cx.fillStyle='#4A90D9'; cx.beginPath(); cx.roundRect(86,57,88,43,10); cx.fill();
    cx.fillStyle='#2471A3'; cx.beginPath(); cx.roundRect(86,84,88,16,[0,0,10,10]); cx.fill();
    cx.fillStyle='white';
    for(let i=0;i<5;i++){cx.beginPath();cx.arc(95+i*18,60,7,Math.PI,0);cx.fill();}

    // plate
    cx.fillStyle='#EEE'; cx.beginPath(); cx.ellipse(130,200,102,10,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#DDD'; cx.beginPath(); cx.ellipse(130,202,102,10,0,0,Math.PI*2); cx.fill();

    // candles
    const cxs=[98,113,130,147,162];
    const cc=['#E8372A','#F5C842','#4A90D9','#7B4FB5','#5BAD52'];
    cxs.forEach((x,i)=>{cx.fillStyle=cc[i];cx.beginPath();cx.roundRect(x-4,28,8,30,4);cx.fill();cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(x-2,32,2,22);});

    // animate flames
    let fr=0;
    function flames(){
      cxs.forEach((x,i)=>{
        cx.clearRect(x-9,8,18,22);
        const fl=Math.sin(fr*0.2+i*1.3)>0;
        cx.fillStyle='#FF8C00'; cx.beginPath(); cx.ellipse(x,fl?21:22,4,8,0,0,Math.PI*2); cx.fill();
        cx.fillStyle='#FFD700'; cx.beginPath(); cx.ellipse(x,fl?22:23,2.5,5,0,0,Math.PI*2); cx.fill();
        cx.fillStyle='white'; cx.beginPath(); cx.arc(x,fl?18:19,1.5,0,Math.PI*2); cx.fill();
      });
      fr++;
      if(document.getElementById('cakeOverlay').classList.contains('show')) requestAnimationFrame(flames);
    }
    flames();
  }

  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
